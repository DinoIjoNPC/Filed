<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK DOWNLOAD · HUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .card {
            background: #0a0a0a;
            border-radius: 32px;
            padding: 28px;
            border: 1px solid #222222;
            box-shadow: 0 20px 40px rgba(0,0,0,1);
        }

        .header {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* NO total database, NO total system, NO dibuat oleh dinooodev - semua dihapus */
        /* MODE SELECTOR */
        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            min-width: 100px;
            background: #1a1a1a;
            border: 1px solid #333333;
            color: #cccccc;
            padding: 16px 0;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-btn.active {
            background: #ffffff;
            border-color: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .panel {
            background: #111111;
            border-radius: 40px;
            padding: 28px;
            margin-bottom: 28px;
            border: 1px solid #2a2a2a;
        }

        /* FILE MODE */
        .file-area {
            text-align: center;
        }

        .file-drop {
            border: 2px dashed #444444;
            border-radius: 40px;
            padding: 40px 20px;
            background: #0d0d0d;
            cursor: pointer;
            transition: 0.2s;
        }

        .file-drop:hover {
            border-color: #888888;
            background: #151515;
        }

        .file-drop .plus {
            font-size: 4rem;
            line-height: 1;
            color: #ffffff;
            font-weight: 300;
        }

        .file-list {
            margin-top: 24px;
            background: #0a0a0a;
            border-radius: 30px;
            padding: 16px;
        }

        .file-item {
            background: #1e1e1e;
            padding: 16px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            border: 1px solid #3a3a3a;
        }

        .file-name {
            font-weight: 500;
            word-break: break-all;
            padding-right: 16px;
            color: white;
        }

        .file-icon {
            background: #2a2a2a;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: white;
        }

        /* INPUT FIELDS */
        .link-input-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .link-field, .paste-textarea {
            background: #0d0d0d;
            border: 1px solid #3a3a3a;
            border-radius: 60px;
            padding: 18px 24px;
            color: white;
            font-size: 1rem;
            outline: none;
            width: 100%;
        }

        .paste-textarea {
            border-radius: 30px;
            min-height: 150px;
            resize: vertical;
        }

        .link-field:focus, .paste-textarea:focus {
            border-color: #ffffff;
        }

        .create-btn {
            background: #ffffff;
            border: none;
            color: #000000;
            font-weight: 800;
            font-size: 1.3rem;
            padding: 18px;
            border-radius: 60px;
            cursor: pointer;
            border: 2px solid #ffffff;
            transition: 0.2s;
            letter-spacing: 1px;
            margin-top: 16px;
        }

        .create-btn:hover {
            background: #e0e0e0;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* LIST DATABASE (hanya ini yang ada) */
        .list-kata {
            background: #111111;
            border-radius: 40px;
            padding: 24px;
            border: 1px solid #2a2a2a;
        }

        .list-header {
            color: white;
            font-weight: 700;
            margin-bottom: 20px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .list-header span {
            background: #2a2a2a;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 1rem;
            color: #dddddd;
        }

        .database-item {
            background: #1a1a1a;
            border-radius: 40px;
            padding: 18px 22px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #3a3a3a;
        }

        .db-left {
            display: flex;
            align-items: center;
            gap: 16px;
            color: white;
        }

        .db-icon {
            font-size: 1.5rem;
        }

        .db-info {
            word-break: break-all;
            padding-right: 12px;
        }

        .db-info div:first-child {
            color: white;
            font-weight: 600;
        }

        .db-type {
            background: #2a2a2a;
            border-radius: 30px;
            padding: 4px 14px;
            color: #cccccc;
            font-size: 0.8rem;
            border: 1px solid #4a4a4a;
        }

        .db-link {
            background: #2a2a2a;
            color: white;
            font-family: monospace;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #555555;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .db-link:hover {
            background: #3a3a3a;
            border-color: #ffffff;
        }

        /* TEXT PREVIEW MODAL (dalam HTML) */
        .text-preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .text-preview-content {
            background: #111111;
            border-radius: 40px;
            padding: 28px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 2px solid #444444;
            box-shadow: 0 20px 40px rgba(0,0,0,1);
        }

        .text-preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            color: white;
        }

        .text-preview-header h3 {
            font-size: 1.6rem;
        }

        .close-preview {
            background: #2a2a2a;
            border: none;
            color: white;
            font-size: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #555;
        }

        .text-preview-body {
            background: #0a0a0a;
            border-radius: 30px;
            padding: 24px;
            color: white;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid #333;
            margin-bottom: 24px;
            max-height: 50vh;
            overflow-y: auto;
        }

        .copy-text-btn {
            background: white;
            color: black;
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            width: 100%;
            border: 2px solid white;
        }

        .copy-text-btn:hover {
            background: #e0e0e0;
        }

        /* FILE DOWNLOAD MODAL */
        .download-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .download-content {
            background: #111111;
            border-radius: 40px;
            padding: 32px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 2px solid #444;
        }

        .download-content h3 {
            color: white;
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .download-filename {
            color: #cccccc;
            background: #1a1a1a;
            padding: 16px;
            border-radius: 40px;
            margin: 24px 0;
            word-break: break-all;
            border: 1px solid #333;
        }

        .download-btn {
            background: white;
            color: black;
            border: none;
            padding: 18px 24px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.4rem;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            border: 2px solid white;
        }

        .download-btn:hover {
            background: #e0e0e0;
        }

        .cancel-btn {
            background: transparent;
            color: #aaaaaa;
            border: 2px solid #333;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }

        .empty-state {
            color: #666666;
            text-align: center;
            padding: 32px;
            font-style: italic;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            color: #000000;
            padding: 14px 28px;
            border-radius: 60px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
            display: none;
            z-index: 3000;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>D OWNLOAD</h1>
            </div>

            <div class="mode-selector">
                <button class="mode-btn active" data-mode="file">📁 File</button>
                <button class="mode-btn" data-mode="link">🔗 Link</button>
                <button class="mode-btn" data-mode="text">📝 Text</button>
            </div>

            <div class="panel" id="panel">
                <div id="file-panel">
                    <div class="file-area">
                        <div class="file-drop" id="fileDrop">
                            <div class="plus">+</div>
                            <div style="color:#aaaaaa;">pilih file</div>
                            <input type="file" id="fileInput" style="display: none;">
                        </div>
                        <div class="file-list" id="fileListContainer" style="display: none;">
                            <div class="file-item" id="currentFileItem">
                                <span class="file-name" id="selectedFileName"></span>
                                <span class="file-icon">📁</span>
                            </div>
                        </div>
                        <button class="create-btn" id="createFileLinkBtn">CREATE LINK</button>
                    </div>
                </div>

                <div id="link-panel" style="display: none;">
                    <div class="link-input-area">
                        <input type="url" class="link-field" id="linkInput" placeholder="https://...">
                        <button class="create-btn" id="createLinkBtn">CREATE LINK</button>
                    </div>
                </div>

                <div id="text-panel" style="display: none;">
                    <div class="link-input-area">
                        <textarea class="paste-textarea" id="textInput" placeholder="Tulis atau tempel teks..."></textarea>
                        <button class="create-btn" id="createTextBtn">CREATE LINK</button>
                    </div>
                </div>
            </div>

            <!-- HANYA LIST DATABASE -->
            <div class="list-kata">
                <div class="list-header">
                    <span>🟢</span> LIST DATABASE
                </div>
                <div id="databaseList">
                    <div class="empty-state">🌟 belum ada data</div>
                </div>
            </div>
        </div>
    </div>

    <!-- TEXT PREVIEW MODAL (dalam HTML) -->
    <div class="text-preview-modal" id="textPreviewModal">
        <div class="text-preview-content">
            <div class="text-preview-header">
                <h3>📝 ISI TEKS</h3>
                <button class="close-preview" id="closeTextPreview">&times;</button>
            </div>
            <div class="text-preview-body" id="textPreviewBody"></div>
            <button class="copy-text-btn" id="copyTextBtn">📋 COPY TEKS</button>
        </div>
    </div>

    <!-- DOWNLOAD MODAL -->
    <div class="download-modal" id="downloadModal">
        <div class="download-content">
            <h3>📁 FILE READY</h3>
            <div class="download-filename" id="downloadFileName"></div>
            <button class="download-btn" id="confirmDownloadBtn">[ DOWNLOAD ]</button>
            <button class="cancel-btn" id="cancelDownloadBtn">Tutup</button>
        </div>
    </div>

    <div class="toast" id="toast">Link disalin!</div>

    <script>
        (function() {
            let db = JSON.parse(localStorage.getItem('darkDownloadDB')) || [];
            let currentMode = 'file';
            let currentFile = null;
            let currentTextItem = null;
            let currentFileItemData = null;

            function generateId() {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789';
                return Array.from({length: 8}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
            }

            // DOM elements
            const filePanel = document.getElementById('file-panel');
            const linkPanel = document.getElementById('link-panel');
            const textPanel = document.getElementById('text-panel');
            const modeBtns = document.querySelectorAll('.mode-btn');
            const fileDrop = document.getElementById('fileDrop');
            const fileInput = document.getElementById('fileInput');
            const fileListContainer = document.getElementById('fileListContainer');
            const selectedFileName = document.getElementById('selectedFileName');
            const createFileLinkBtn = document.getElementById('createFileLinkBtn');
            const databaseList = document.getElementById('databaseList');
            
            // Modals
            const textModal = document.getElementById('textPreviewModal');
            const textPreviewBody = document.getElementById('textPreviewBody');
            const closeTextPreview = document.getElementById('closeTextPreview');
            const copyTextBtn = document.getElementById('copyTextBtn');
            
            const downloadModal = document.getElementById('downloadModal');
            const downloadFileName = document.getElementById('downloadFileName');
            const confirmDownloadBtn = document.getElementById('confirmDownloadBtn');
            const cancelDownloadBtn = document.getElementById('cancelDownloadBtn');

            const toast = document.getElementById('toast');

            // Link & text inputs
            const linkInput = document.getElementById('linkInput');
            const createLinkBtn = document.getElementById('createLinkBtn');
            const textInput = document.getElementById('textInput');
            const createTextBtn = document.getElementById('createTextBtn');

            function showToast(msg) {
                toast.textContent = msg;
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 2000);
            }

            function renderDB() {
                if (db.length === 0) {
                    databaseList.innerHTML = `<div class="empty-state">🌟 belum ada data</div>`;
                    return;
                }

                let html = '';
                [...db].reverse().forEach(item => {
                    let icon = '📄';
                    if (item.type === 'link') icon = '🔗';
                    if (item.type === 'text') icon = '📝';
                    if (item.type === 'file') icon = '📁';

                    const displayName = item.name.length > 35 ? item.name.substring(0,32)+'…' : item.name;
                    const baseUrl = window.location.origin + window.location.pathname;
                    const fullLink = `${baseUrl}?id=${item.id}`;

                    html += `
                        <div class="database-item" data-id="${item.id}">
                            <div class="db-left">
                                <span class="db-icon">${icon}</span>
                                <div class="db-info">
                                    <div>${displayName}</div>
                                    <span class="db-type">${item.type}</span>
                                </div>
                            </div>
                            <div class="db-actions">
                                <span class="db-link" onclick="window.copyLink('${fullLink}')">🔗 ${item.id}</span>
                            </div>
                        </div>
                    `;
                });
                databaseList.innerHTML = html;
            }

            window.copyLink = function(text) {
                navigator.clipboard.writeText(text).then(() => showToast('Link disalin!'));
            };

            function saveDB() {
                localStorage.setItem('darkDownloadDB', JSON.stringify(db));
                renderDB();
            }

            function addItem(type, name, content) {
                const id = generateId();
                db.push({ id, type, name, content, timestamp: Date.now() });
                saveDB();
                
                const baseUrl = window.location.origin + window.location.pathname;
                const fullLink = `${baseUrl}?id=${id}`;
                showToast(`LINK: ${fullLink}`);
                return id;
            }

            // Mode switching
            function setMode(mode) {
                currentMode = mode;
                filePanel.style.display = mode === 'file' ? 'block' : 'none';
                linkPanel.style.display = mode === 'link' ? 'block' : 'none';
                textPanel.style.display = mode === 'text' ? 'block' : 'none';

                modeBtns.forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.mode === mode) btn.classList.add('active');
                });
            }

            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => setMode(btn.dataset.mode));
            });

            // File handling
            fileDrop.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                currentFile = { name: file.name, file };
                selectedFileName.innerText = file.name;
                fileListContainer.style.display = 'block';

                const reader = new FileReader();
                reader.onload = (ev) => currentFile.dataURL = ev.target.result;
                reader.readAsDataURL(file);
            });

            createFileLinkBtn.addEventListener('click', () => {
                if (!currentFile?.dataURL) {
                    alert('Pilih file dulu');
                    return;
                }
                addItem('file', currentFile.name, currentFile.dataURL);
                currentFile = null;
                fileListContainer.style.display = 'none';
                fileInput.value = '';
            });

            createLinkBtn.addEventListener('click', () => {
                const url = linkInput.value.trim();
                if (!url) return alert('Masukkan link');
                let finalUrl = url.startsWith('http') ? url : 'https://' + url;
                addItem('link', finalUrl, finalUrl);
                linkInput.value = '';
            });

            createTextBtn.addEventListener('click', () => {
                const txt = textInput.value.trim();
                if (!txt) return alert('Masukkan teks');
                const preview = txt.substring(0, 30) + (txt.length > 30 ? '…' : '');
                addItem('text', preview, txt);
                textInput.value = '';
            });

            // Handle URL parameter
            function handleUrlParam() {
                const id = new URLSearchParams(window.location.search).get('id');
                if (!id) return;

                const item = db.find(i => i.id === id);
                if (!item) return alert('Item tidak ditemukan');

                if (item.type === 'link') {
                    window.open(item.content, '_blank');
                } 
                else if (item.type === 'text') {
                    currentTextItem = item;
                    textPreviewBody.textContent = item.content;
                    textModal.style.display = 'flex';
                } 
                else if (item.type === 'file') {
                    currentFileItemData = item;
                    downloadFileName.textContent = item.name;
                    downloadModal.style.display = 'flex';
                }

                // Bersihkan URL
                window.history.replaceState({}, '', window.location.pathname);
            }

            // Modal controls
            closeTextPreview.addEventListener('click', () => {
                textModal.style.display = 'none';
                currentTextItem = null;
            });

            copyTextBtn.addEventListener('click', () => {
                if (currentTextItem) {
                    navigator.clipboard.writeText(currentTextItem.content)
                        .then(() => {
                            showToast('Teks disalin!');
                            textModal.style.display = 'none';
                        });
                }
            });

            confirmDownloadBtn.addEventListener('click', () => {
                if (currentFileItemData?.content) {
                    const a = document.createElement('a');
                    a.href = currentFileItemData.content;
                    a.download = currentFileItemData.name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    downloadModal.style.display = 'none';
                    currentFileItemData = null;
                }
            });

            cancelDownloadBtn.addEventListener('click', () => {
                downloadModal.style.display = 'none';
                currentFileItemData = null;
            });

            // Click outside to close
            textModal.addEventListener('click', (e) => {
                if (e.target === textModal) {
                    textModal.style.display = 'none';
                    currentTextItem = null;
                }
            });

            downloadModal.addEventListener('click', (e) => {
                if (e.target === downloadModal) {
                    downloadModal.style.display = 'none';
                    currentFileItemData = null;
                }
            });

            // Drag drop
            fileDrop.addEventListener('dragover', (e) => {
                e.preventDefault();
                fileDrop.style.borderColor = '#888';
            });
            fileDrop.addEventListener('dragleave', () => {
                fileDrop.style.borderColor = '#444';
            });
            fileDrop.addEventListener('drop', (e) => {
                e.preventDefault();
                fileDrop.style.borderColor = '#444';
                const file = e.dataTransfer.files[0];
                if (file) {
                    fileInput.files = e.dataTransfer.files;
                    fileInput.dispatchEvent(new Event('change'));
                }
            });

            // Initial
            renderDB();
            setMode('file');
            handleUrlParam();
        })();
    </script>
</body>
</html>
