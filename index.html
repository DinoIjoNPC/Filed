<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOWNLOAD · HUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0a0c14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .container {
            max-width: 750px;
            width: 100%;
        }

        .card {
            background: #131826;
            border-radius: 32px;
            padding: 24px;
            border: 1px solid #2f3a54;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #90a8ff, #c0b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .badge {
            background: #20293f;
            padding: 8px 18px;
            border-radius: 40px;
            color: #baceff;
            border: 1px solid #4a5a83;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .badge span {
            color: #feca7e;
            font-weight: 700;
        }

        .info-bar {
            background: #0f1522;
            border-radius: 50px;
            padding: 12px 22px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            border: 1px solid #2e3b58;
            color: white;
            flex-wrap: wrap;
            gap: 10px;
        }

        .total-items {
            background: #29344f;
            padding: 4px 16px;
            border-radius: 30px;
            color: #dbdbff;
        }

        .creator {
            color: #adc0ff;
        }

        .creator a {
            color: #ffd98c;
            text-decoration: none;
            background: #1e2842;
            padding: 3px 16px;
            border-radius: 30px;
            margin-left: 8px;
            border: 1px solid #5c6fa3;
        }

        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            min-width: 100px;
            background: #1f2942;
            border: 1px solid #3e4d75;
            color: #ccd9ff;
            padding: 14px 0;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-btn.active {
            background: #5c6fb1;
            border-color: #a7b9ff;
            color: white;
            box-shadow: 0 0 15px #4f6cdf;
        }

        .panel {
            background: #1a2337;
            border-radius: 40px;
            padding: 24px;
            margin-bottom: 28px;
            border: 1px solid #38486b;
            min-height: 240px;
        }

        .file-area {
            text-align: center;
        }

        .file-drop {
            border: 2px dashed #4f6396;
            border-radius: 40px;
            padding: 40px 20px;
            background: #131e32;
            cursor: pointer;
            transition: 0.2s;
        }

        .file-drop:hover {
            border-color: #8da4ff;
            background: #1b2945;
        }

        .file-drop .plus {
            font-size: 4rem;
            line-height: 1;
            color: #98abff;
            font-weight: 300;
        }

        .file-list {
            margin-top: 24px;
            background: #101a2b;
            border-radius: 30px;
            padding: 16px;
        }

        .file-item {
            background: #263153;
            padding: 16px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            border: 1px solid #5d73b0;
        }

        .file-name {
            font-weight: 500;
            word-break: break-all;
            padding-right: 16px;
        }

        .file-icon {
            background: #0f1a30;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .link-input-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .link-field {
            background: #0f1a2d;
            border: 1px solid #40588a;
            border-radius: 60px;
            padding: 16px 24px;
            color: white;
            font-size: 1rem;
            outline: none;
            width: 100%;
        }

        .link-field:focus {
            border-color: #a7bdff;
        }

        .paste-textarea {
            background: #0f1a2d;
            border: 1px solid #40588a;
            border-radius: 30px;
            padding: 20px;
            color: white;
            font-size: 1rem;
            min-height: 150px;
            resize: vertical;
            outline: none;
            width: 100%;
        }

        .create-btn {
            background: #5c6fb1;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            padding: 18px;
            border-radius: 60px;
            cursor: pointer;
            border: 1px solid #98adff;
            transition: 0.2s;
            letter-spacing: 1px;
            margin-top: 16px;
        }

        .create-btn:hover {
            background: #7389da;
            box-shadow: 0 0 15px #5f7cff;
        }

        .list-kata {
            background: #101a2b;
            border-radius: 40px;
            padding: 20px;
            margin-top: 20px;
        }

        .list-header {
            color: #cbd5ff;
            font-weight: 600;
            margin-bottom: 16px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .list-header span {
            background: #33415e;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .database-item {
            background: #1f2c48;
            border-radius: 40px;
            padding: 16px 22px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #4b6193;
        }

        .db-left {
            display: flex;
            align-items: center;
            gap: 14px;
            color: white;
        }

        .db-icon {
            font-size: 1.4rem;
        }

        .db-info {
            word-break: break-all;
            padding-right: 12px;
        }

        .db-type {
            background: #121d38;
            border-radius: 30px;
            padding: 2px 12px;
            color: #b9d0ff;
            font-size: 0.75rem;
            border: 1px solid #6177b5;
        }

        .db-link {
            color: #a7b9ff;
            font-family: monospace;
            background: #0a1322;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            border: 1px solid #4a6199;
        }

        .empty-state {
            color: #8895c0;
            text-align: center;
            padding: 28px;
            font-style: italic;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a45;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            border: 1px solid #6c86cc;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>D OWNLOAD</h1>
                <div class="badge">
                    <span>⛁</span> database · <span id="totalCount">0</span>
                </div>
            </div>

            <div class="info-bar">
                <div class="total-items" id="totalDisplay">Total: 0</div>
                <div class="creator">Web Dibuat: <a href="#">@dinooodev</a></div>
            </div>

            <div class="mode-selector">
                <button class="mode-btn active" data-mode="file">📁 File</button>
                <button class="mode-btn" data-mode="link">🔗 Link</button>
                <button class="mode-btn" data-mode="text">📝 Paste Text</button>
            </div>

            <div class="panel" id="panel">
                <div id="file-panel">
                    <div class="file-area">
                        <div class="file-drop" id="fileDrop">
                            <div class="plus">+</div>
                            <div style="color:#b1c8ff; margin-top:8px;">pilih file (storage)</div>
                            <input type="file" id="fileInput" style="display: none;">
                        </div>
                        <div class="file-list" id="fileListContainer" style="display: none;">
                            <div class="file-item" id="currentFileItem">
                                <span class="file-name" id="selectedFileName"></span>
                                <span class="file-icon">📁</span>
                            </div>
                        </div>
                        <button class="create-btn" id="createFileLinkBtn">[ Create Link ]</button>
                    </div>
                </div>

                <div id="link-panel" style="display: none;">
                    <div class="link-input-area">
                        <input type="url" class="link-field" id="linkInput" placeholder="https:// ...">
                        <button class="create-btn" id="createLinkBtn">[ Create Link ]</button>
                    </div>
                </div>

                <div id="text-panel" style="display: none;">
                    <div class="link-input-area">
                        <textarea class="paste-textarea" id="textInput" placeholder="Teks atau konten..."></textarea>
                        <button class="create-btn" id="createTextBtn">[ Create Link ]</button>
                    </div>
                </div>
            </div>

            <div class="list-kata">
                <div class="list-header">
                    <span>🟢</span> LIST DATABASE <span id="itemCountSpan">0 item</span>
                </div>
                <div id="databaseList">
                    <div class="empty-state">🌟 masukkan file / link / text</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Link copied!</div>

    <script>
        (function() {
            let db = JSON.parse(localStorage.getItem('downloadHubDB')) || [];
            let currentMode = 'file';
            let currentFile = null;

            // Generate random ID (A-Z, 1-9) length 8
            function generateRandomId() {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789';
                let result = '';
                for (let i = 0; i < 8; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }

            // DOM elements
            const filePanel = document.getElementById('file-panel');
            const linkPanel = document.getElementById('link-panel');
            const textPanel = document.getElementById('text-panel');
            const modeBtns = document.querySelectorAll('.mode-btn');
            const fileDrop = document.getElementById('fileDrop');
            const fileInput = document.getElementById('fileInput');
            const fileListContainer = document.getElementById('fileListContainer');
            const selectedFileName = document.getElementById('selectedFileName');
            const currentFileItem = document.getElementById('currentFileItem');
            const createFileLinkBtn = document.getElementById('createFileLinkBtn');
            const databaseList = document.getElementById('databaseList');
            const totalDisplay = document.getElementById('totalDisplay');
            const totalCount = document.getElementById('totalCount');
            const itemCountSpan = document.getElementById('itemCountSpan');
            const toast = document.getElementById('toast');

            // Link & text
            const linkInput = document.getElementById('linkInput');
            const createLinkBtn = document.getElementById('createLinkBtn');
            const textInput = document.getElementById('textInput');
            const createTextBtn = document.getElementById('createTextBtn');

            function showToast(msg) {
                toast.textContent = msg;
                toast.style.display = 'block';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
            }

            function renderDB() {
                const container = databaseList;
                if (db.length === 0) {
                    container.innerHTML = `<div class="empty-state">🌟 masukkan file / link / text</div>`;
                } else {
                    let html = '';
                    [...db].reverse().forEach(item => {
                        let icon = '📄';
                        if (item.type === 'link') icon = '🔗';
                        if (item.type === 'text') icon = '📝';
                        if (item.type === 'file') icon = '📁';

                        const displayName = item.name.length > 35 ? item.name.substring(0,32)+'…' : item.name;
                        const baseUrl = window.location.origin + window.location.pathname;
                        const fullLink = `${baseUrl}?id=${item.id}`;

                        html += `
                            <div class="database-item" data-id="${item.id}">
                                <div class="db-left">
                                    <span class="db-icon">${icon}</span>
                                    <div class="db-info">
                                        <div style="font-weight:600;">${displayName}</div>
                                        <span class="db-type">${item.type}</span>
                                    </div>
                                </div>
                                <div class="db-actions">
                                    <span class="db-link" onclick="copyToClipboard('${fullLink}')" style="cursor:pointer;">🔗 ${item.id}</span>
                                </div>
                            </div>
                        `;
                    });
                    container.innerHTML = html;
                }
                
                const total = db.length;
                totalDisplay.innerText = `Total: ${total}`;
                totalCount.innerText = total;
                itemCountSpan.innerText = total + ' item';
            }

            window.copyToClipboard = function(text) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Link disalin!');
                }).catch(() => {
                    prompt('Salin manual:', text);
                });
            };

            function saveDB() {
                localStorage.setItem('downloadHubDB', JSON.stringify(db));
                renderDB();
            }

            function addItem(type, name, content) {
                const id = generateRandomId();
                const newItem = {
                    id: id,
                    type: type,
                    name: name || 'tanpa nama',
                    content: content,
                    timestamp: new Date().toISOString()
                };
                db.push(newItem);
                saveDB();
                
                const baseUrl = window.location.origin + window.location.pathname;
                const fullLink = `${baseUrl}?id=${id}`;
                showToast(`Link: ${fullLink}`);
                
                return id;
            }

            // Mode switching
            function setMode(mode) {
                currentMode = mode;
                filePanel.style.display = mode === 'file' ? 'block' : 'none';
                linkPanel.style.display = mode === 'link' ? 'block' : 'none';
                textPanel.style.display = mode === 'text' ? 'block' : 'none';

                modeBtns.forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.mode === mode) btn.classList.add('active');
                });
            }

            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => setMode(btn.dataset.mode));
            });

            // File handling
            fileDrop.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                currentFile = { name: file.name, file: file };
                selectedFileName.innerText = file.name;
                fileListContainer.style.display = 'block';

                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentFile.dataURL = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            // Create Link for File
            createFileLinkBtn.addEventListener('click', () => {
                if (!currentFile || !currentFile.dataURL) {
                    alert('Pilih file terlebih dahulu');
                    return;
                }
                addItem('file', currentFile.name, currentFile.dataURL);
                // Reset
                currentFile = null;
                fileListContainer.style.display = 'none';
                fileInput.value = '';
            });

            // Create Link for URL
            createLinkBtn.addEventListener('click', () => {
                const url = linkInput.value.trim();
                if (!url) {
                    alert('Masukkan link');
                    return;
                }
                let finalUrl = url;
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    finalUrl = 'https://' + url;
                }
                addItem('link', finalUrl, finalUrl);
                linkInput.value = '';
            });

            // Create Link for Text
            createTextBtn.addEventListener('click', () => {
                const txt = textInput.value.trim();
                if (!txt) {
                    alert('Masukkan teks');
                    return;
                }
                const previewName = txt.substring(0, 30) + (txt.length > 30 ? '…' : '');
                addItem('text', previewName, txt);
                textInput.value = '';
            });

            // Drag & drop
            fileDrop.addEventListener('dragover', (e) => {
                e.preventDefault();
                fileDrop.style.borderColor = '#b0c6ff';
            });
            fileDrop.addEventListener('dragleave', () => {
                fileDrop.style.borderColor = '#4f6396';
            });
            fileDrop.addEventListener('drop', (e) => {
                e.preventDefault();
                fileDrop.style.borderColor = '#4f6396';
                const file = e.dataTransfer.files[0];
                if (file) {
                    fileInput.files = e.dataTransfer.files;
                    const event = new Event('change', { bubbles: true });
                    fileInput.dispatchEvent(event);
                }
            });

            // Handle URL parameter untuk akses langsung
            function handleUrlParam() {
                const urlParams = new URLSearchParams(window.location.search);
                const id = urlParams.get('id');
                if (!id) return;

                const item = db.find(i => i.id === id);
                if (!item) {
                    alert('Item tidak ditemukan');
                    return;
                }

                if (item.type === 'link') {
                    window.open(item.content, '_blank');
                } else if (item.type === 'text') {
                    alert('📋 ISI TEKS:\n\n' + item.content);
                } else if (item.type === 'file' && item.content.startsWith('data:')) {
                    const a = document.createElement('a');
                    a.href = item.content;
                    a.download = item.name;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            }

            // Initial render
            renderDB();
            setMode('file');
            handleUrlParam();

            // Optional: bersihkan URL parameter setelah diproses
            if (window.location.search.includes('id=')) {
                setTimeout(() => {
                    window.history.replaceState({}, document.title, window.location.pathname);
                }, 100);
            }
        })();
    </script>
</body>
</html>
